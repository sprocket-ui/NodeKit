name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true
  LEFTHOOK: 0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.SPROCKET_BOT_ID }}
          private_key: ${{ secrets.SPROCKET_BOT_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Create Release PR
        id: create_release_pr
        uses: changesets/action@v1
        with:
          title: 'chore: release packages'
          createGithubReleases: true
          commit: 'chore: package versioning'
          publish: pnpm exec changeset publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      - name: Update Release PR body
        if: steps.create_release_pr.outputs.pullRequestNumber
        run: |
          gh pr edit ${{ steps.create_release_pr.outputs.pullRequestNumber }} --body "$(cat <<'EOF'
          ## Release

          This PR bumps package versions based on merged changesets and will publish them to npm when merged.

          > [!IMPORTANT]
          > Review the version bumps and changelogs below before merging.
          > Merging will trigger publishing to npm with provenance via trusted publishers.
          EOF
          )"
        shell: bash
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Add automerge label to release PR
        if: steps.create_release_pr.outputs.pullRequestNumber
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: automerge
          number: ${{ steps.create_release_pr.outputs.pullRequestNumber }}
          github_token: ${{ steps.generate_token.outputs.token }}
