name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true
  LEFTHOOK: 0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.SPROCKET_BOT_ID }}
          private_key: ${{ secrets.SPROCKET_BOT_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install PNPM
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Strip devDependencies from packages
        uses: actions/github-script@v7
        with:
          script: await import(`${process.env.GITHUB_WORKSPACE}/scripts/clean-publish.mjs`)

      - name: Create Release PR
        id: create_release_pr
        uses: changesets/action@v1
        with:
          title: 'chore: release packages'
          createGithubReleases: true
          commit: 'chore: package versioning'
          publish: pnpm exec changeset publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      - name: Add automerge label to release PR
        if: steps.create_release_pr.outputs.pullRequestNumber
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: automerge
          number: ${{ steps.create_release_pr.outputs.pullRequestNumber }}
          github_token: ${{ steps.generate_token.outputs.token }}
