coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 1%
        informational: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/dist/**"
  - "**/build/**"
  - "**/node_modules/**"
  - "**/*.config.ts"
  - "**/*.config.js"
  - "**/vitest.config.ts"
  - "**/tsup.config.ts"
  - "**/.storybook/**"
  - "**/*.stories.tsx"

github_checks:
  annotations: true
